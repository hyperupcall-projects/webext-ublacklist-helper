<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 200px;
      padding: 10px;
      font-family: Arial, sans-serif;
    }
    .title {
      font-size: 14px;
      font-weight: bold;
      margin-bottom: 10px;
    }
    .color-button {
      width: 100%;
      padding: 8px;
      margin: 4px 0;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
    }
    .color-green { background: #28a745; color: white; }
    .color-yellow { background: #ffc107; color: #212529; }
    .color-red { background: #dc3545; color: white; }
    .color-button:hover { opacity: 0.8; }
  </style>
</head>
<body>
  <div class="title">Select Color</div>
  <button class="color-button color-green" data-color="green">Color 1</button>
  <button class="color-button color-yellow" data-color="yellow">Color 2</button>
  <button class="color-button color-red" data-color="red">Color 3</button>
  
  <script src="popup.js"></script>
</body>
</html>
